services:
  - type: web
    name: memory-journal
    env: python
    buildCommand: pip install -r apps/memory-journal-app/requirements.txt
    startCommand: cd apps/memory-journal-app && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_NAME
        value: "Memory Journal"
      - key: DATABASE_URL
        value: "sqlite:///./history.db"

  - type: web
    name: doomscroll-breaker
    env: python
    buildCommand: pip install -r apps/doomscroll-breaker-app/requirements.txt
    startCommand: cd apps/doomscroll-breaker-app && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_NAME
        value: "Doomscroll Breaker"

  - type: web
    name: visual-intelligence
    env: python
    buildCommand: pip install -r apps/visual-intelligence-app/requirements.txt
    startCommand: cd apps/visual-intelligence-app && uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: starter # YOLO might need more than 512MB RAM
    envVars:
      - key: APP_NAME
        value: "Visual Intelligence"

  - type: web
    name: micro-habit-engine
    env: python
    buildCommand: pip install -r apps/micro-habit-engine/requirements.txt
    startCommand: cd apps/micro-habit-engine && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_NAME
        value: "Micro-Habit Engine"

  - type: web
    name: unified-dashboard
    env: python
    buildCommand: pip install -r apps/unified-dashboard-app/requirements.txt
    startCommand: cd apps/unified-dashboard-app && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_NAME
        value: "AI Life Dashboard"
      - key: JOURNAL_API_URL
        fromService:
          name: memory-journal
          type: web
          property: host
      - key: DOOMSCROLL_API_URL
        fromService:
          name: doomscroll-breaker
          type: web
          property: host
      - key: VISION_API_URL
        fromService:
          name: visual-intelligence
          type: web
          property: host
      - key: HABIT_API_URL
        fromService:
          name: micro-habit-engine
          type: web
          property: host
