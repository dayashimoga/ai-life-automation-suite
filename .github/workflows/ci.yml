name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app:
          - unified-dashboard-app
          - memory-journal-app
          - doomscroll-breaker-app
          - visual-intelligence-app
          - micro-habit-engine
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: |
          cd apps/${{ matrix.app }}
          pip install -r requirements.txt
          pip install ruff black pytest pytest-cov

      - name: Run linting
        run: |
          cd apps/${{ matrix.app }}
          ruff check .
          black --check .

      - name: Run tests with coverage
        run: |
          cd apps/${{ matrix.app }}
          pytest --cov=. --cov-fail-under=90

      - name: Build artifact (ZIP)
        run: |
          cd apps
          zip -r ${{ matrix.app }}.zip ${{ matrix.app }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.app }}-artifact
          path: apps/${{ matrix.app }}.zip
