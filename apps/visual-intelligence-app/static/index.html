<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1d2b45">
    <link rel="manifest" href="manifest.json">
    <title>Visual Intelligence</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-grid"></div>

    <nav class="glass-nav">
        <h1>👁️ Visual Intelligence Engine</h1>
        <button id="theme-toggle" class="btn-icon">🌘</button>
    </nav>

    <main class="container">
        <section class="upload-section glass-panel">
            <h2>Process Frame</h2>
            <div class="camera-controls" style="display:flex; gap:10px; margin-bottom: 1rem;">
                <button id="start-camera" class="btn-primary" style="flex:1;">Start Live Camera</button>
                <button id="reset-workflow" class="btn-secondary hidden" style="flex:1;">Reset Workflow</button>
            </div>
            <video id="webcam-video" autoplay playsinline class="hidden" style="width:100%; border-radius:10px; margin-bottom:1rem; border: 1px solid rgba(255,255,255,0.1);"></video>
            <canvas id="camera-canvas" class="hidden"></canvas>
            
            <div id="dropzone" class="dropzone">
                <p>Upload an image for YOLOv8 real-time segmentation</p>
                <input type="file" id="file-input" accept="image/*,video/mp4" hidden>
            </div>
            
            <div id="loading" class="hidden loading-pulse">Processing via Neural Network...</div>
            
            <div id="results" class="results-grid hidden">
                <div class="result-img">
                    <h3>Input Frame</h3>
                    <img id="raw-image" src="" alt="Raw Input">
                </div>
                <div class="result-img">
                    <h3>Annotated Frame</h3>
                    <img id="annotated-image" src="" alt="Annotated Output">
                </div>
            </div>
        </section>

        <section class="data-section">
            <div class="counts-panel glass-panel">
                <h2>Live Detection Array</h2>
                <div id="counts-container" class="counts-container">
                    <!-- Counts injected here -->
                    <p style="color:var(--text-muted);">Awaiting telemetry...</p>
                </div>
            </div>
            
            <div class="events-panel glass-panel">
                <div class="events-header" style="display:flex; justify-content:space-between; align-items:center;">
                    <h2 style="margin:0;">Live Anomaly Telemetry</h2>
                    <div style="display:flex; align-items:center; gap:10px;">
                        <button id="view-history" class="btn-secondary" style="font-size:0.8rem; padding: 4px 10px;">View SQLite History</button>
                        <div class="pulse-indicator" style="width: 10px; height: 10px; background: #00ff88; border-radius: 50%; box-shadow: 0 0 10px #00ff88; animation: pulse 2s infinite;"></div>
                    </div>
                </div>
                <div id="events-container" class="events-container">
                    <!-- Events injected here -->
                </div>
            </div>
        </section>
    </main>

    <!-- History Modal -->
    <div id="history-modal" class="hidden" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(11, 17, 32, 0.9); z-index:999; display:flex; justify-content:center; align-items:center;">
        <div class="glass-panel" style="width:90%; max-width:800px; max-height:80vh; overflow-y:auto; padding:2rem;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem;">
                <h2 style="margin:0;">Historical SQLite Analysis</h2>
                <button id="close-history" class="btn-primary" style="background:#ef4444;">Close</button>
            </div>
            <div id="history-content" style="color:#aab4cc;">Loading...</div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
